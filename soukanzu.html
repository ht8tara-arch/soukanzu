<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>考察・相関図キャンバス Pro</title>
    <style>
        /* 🎨 プロ仕様のカラーパレット定義 */
        :root {
            --bg-color: #f5f5f7;
            --card-color: #ffffff;
            --panel-color: rgba(255, 255, 255, 0.88);
            --text-color: #1d1d1f;
            --text-muted: #86868b;
            --border-color: rgba(0, 0, 0, 0.08);
            --primary-color: #0071e3;
            --primary-hover: #0077ed;
            --accent-bg: rgba(0, 0, 0, 0.04);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.04);
            --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 12px 32px rgba(0, 0, 0, 0.12);
            --line-color: #d2d2d7;
        }

        body.dark-mode {
            --bg-color: #000000;
            --card-color: #1c1c1e;
            --panel-color: rgba(28, 28, 30, 0.85);
            --text-color: #f5f5f7;
            --text-muted: #86868b;
            --border-color: rgba(255, 255, 255, 0.12);
            --primary-color: #2997ff;
            --primary-hover: #40a4ff;
            --accent-bg: rgba(255, 255, 255, 0.06);
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.4);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.5);
            --shadow-lg: 0 16px 40px rgba(0, 0, 0, 0.6);
            --line-color: #424245;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Helvetica, Arial, sans-serif; letter-spacing: -0.01em; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            overflow: hidden;
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
        }

        header {
            background-color: var(--panel-color);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            display: flex; justify-content: space-between; align-items: center;
            z-index: 1000; /* ヘッダーをキャンバスより上にする */
            box-shadow: var(--shadow-sm);
            position: relative;
        }

        .brand { display: flex; align-items: center; gap: 12px; }
        .brand h1 { font-size: 0.95rem; font-weight: 600; }
        
        .board-badge { 
            font-size: 0.75rem; background: var(--accent-bg); padding: 5px 14px; border-radius: 99px; color: var(--text-color); font-weight: 500; cursor: pointer; transition: all 0.2s ease;
        }
        .board-badge:hover { background: var(--text-color); color: var(--card-color); }

        .controls { display: flex; gap: 8px; align-items: center; }
        .nav-item { position: relative; display: inline-block; z-index: 1001; }
        
        .btn {
            background-color: var(--accent-bg); color: var(--text-color); border: none;
            padding: 8px 16px; border-radius: 98px; font-size: 0.8rem; font-weight: 500;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
            transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); user-select: none;
        }
        .btn:hover { background-color: var(--border-color); transform: scale(1.02); }
        .btn.btn-primary { background-color: var(--primary-color); color: white; }
        .btn.btn-primary:hover { background-color: var(--primary-hover); }

        .dropdown-menu {
            position: absolute; top: 100%; right: 0;
            background-color: var(--panel-color); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border-color); border-radius: 14px; box-shadow: var(--shadow-lg);
            display: flex; flex-direction: column; padding: 6px; min-width: 220px;
            opacity: 0; pointer-events: none; transform: translateY(-6px);
            transition: opacity 0.15s, transform 0.15s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 2000; /* メニューを一番手前に表示 */
            margin-top: 6px;
        }
        .dropdown-menu::before { content: ''; position: absolute; top: -6px; left: 0; width: 100%; height: 6px; background: transparent; }
        .nav-item:hover .dropdown-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }

        .dropdown-item {
            background: none; border: none; color: var(--text-color);
            padding: 10px 14px; font-size: 0.8rem; text-align: left; border-radius: 8px;
            cursor: pointer; display: flex; align-items: center; gap: 8px; transition: background 0.15s;
            width: 100%; white-space: nowrap; font-weight: 500;
        }
        .dropdown-item:hover { background-color: var(--accent-bg); color: var(--primary-color); }
        .dropdown-divider { height: 1px; background-color: var(--border-color); margin: 6px 0; }

        .main-container {
            flex: 1;
            display: flex;
            position: relative;
            width: 100vw;
            height: calc(100vh - 65px);
            overflow: hidden;
        }
        
        #sidebar {
            width: 0; 
            height: 100%;
            background-color: var(--panel-color);
            backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px);
            border-left: 0 solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 90;
            overflow-x: hidden;
            overflow-y: auto;
            transition: width 0.25s cubic-bezier(0.25, 1, 0.5, 1), padding 0.25s;
            pointer-events: auto;
        }
        #sidebar.open { 
            width: 330px; 
            padding: 26px;
            border-left: 1px solid var(--border-color);
            box-shadow: var(--shadow-lg);
        }

        /* 💡 ここが魔法のスクロール設定です */
        #canvas-container { 
            flex: 1; 
            height: 100%;
            position: relative; 
            overflow: auto; /* スルスル動くスクロールモードを有効化 */
            cursor: grab;
            z-index: 1;
        }

        #relation-svg, #html-layer { 
            position: absolute; 
            top: 0; left: 0; 
            width: 3000px; /* 縦横3000pxの広大な空間 */
            height: 3000px; 
        }
        #relation-svg { z-index: 2; pointer-events: none; }
        #html-layer { z-index: 3; pointer-events: auto; } /* 💡 noneからautoに変更！これでカードを掴めるようになります */

        .ctrl-header-actions { display: flex; gap: 4px; align-items: center; }
        .flat-btn { background: var(--accent-bg); border: none; color: var(--text-muted); width: 24px; height: 24px; border-radius: 50%; font-size: 0.75rem; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 0.2s; }
        .flat-btn:hover { background: var(--border-color); color: var(--text-color); }
        .flat-btn.hide-btn:hover { color: var(--primary-color); background: rgba(0, 113, 227, 0.08); }
        .flat-btn.del-btn:hover { color: #ff453a; background: rgba(255, 69, 58, 0.08); }

        .generic-resize-handle { position: absolute; right: 6px; bottom: 6px; width: 16px; height: 16px; cursor: se-resize; opacity: 0; transition: opacity 0.2s; display: flex; align-items: flex-end; justify-content: flex-end; }
        .generic-resize-handle::after { content: ""; width: 6px; height: 6px; border-right: 2px solid var(--text-muted); border-bottom: 2px solid var(--text-muted); }

        /* 🛡️ 陣営エリア */
        .camp-zone {
            position: absolute; width: 280px; height: 240px;
            background-color: rgba(255, 255, 255, 0.1); border: 1px dashed var(--line-color); border-radius: 24px;
            padding: 18px; cursor: move; z-index: 10; pointer-events: auto;
        }
        .camp-zone.active-camp { border-style: solid; border-width: 2px; border-color: var(--primary-color) !important; background-color: rgba(0, 113, 227, 0.03); }
        body.dark-mode .camp-zone { background-color: rgba(255, 255, 255, 0.02); }
        .camp-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .camp-title-input { border: none; background: transparent; font-size: 0.85rem; font-weight: 600; outline: none; width: 50%; padding: 4px; border-radius: 6px; color: var(--text-color); }
        .camp-title-input:focus { background: var(--card-color); }
        .camp-zone:hover .generic-resize-handle { opacity: 0.5; }

        /* 📦 枠パネル */
        .panel-zone {
            position: absolute; width: 300px; height: 200px;
            background-color: rgba(0, 0, 0, 0.02); border: 1px solid var(--line-color); border-radius: 16px;
            padding: 16px; cursor: move; z-index: 5; pointer-events: auto;
        }
        .panel-zone.active-panel { border-color: var(--primary-color) !important; box-shadow: var(--shadow-sm); }
        body.dark-mode .panel-zone { background-color: rgba(255, 255, 255, 0.02); }
        .panel-header { display: flex; justify-content: space-between; align-items: center; }
        .panel-title-input { border: none; background: transparent; font-size: 0.85rem; font-weight: 600; outline: none; width: 70%; padding: 4px; border-radius: 6px; color: var(--text-color); }
        .panel-title-input:focus { background: var(--card-color); }
        .panel-zone:hover .generic-resize-handle { opacity: 0.5; }

        /* 👥 人物カード */
        .character-card {
            position: absolute; width: 92px; height: 92px;
            background-color: var(--card-color); border: 1px solid var(--line-color); border-radius: 50%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            box-shadow: var(--shadow-md); cursor: move; user-select: none;
            z-index: 20; pointer-events: auto;
        }
        .character-card.active-card { border-color: var(--primary-color) !important; border-width: 2px; }
        .character-card input.name-input {
            width: 82%; border: none; background: rgba(255, 255, 255, 0.9); border-radius: 6px;
            text-align: center; font-size: 0.75rem; font-weight: 500; color: #1d1d1f; outline: none; cursor: text; z-index: 2; padding: 2px 0;
        }
        body.dark-mode .character-card input.name-input { background: rgba(28, 28, 30, 0.85); color: #f5f5f7; }

        .card-controls { position: absolute; top: -6px; right: -6px; display: flex; gap: 3px; opacity: 0; transition: opacity 0.2s ease; z-index: 10; }
        .character-card:hover .card-controls { opacity: 1; }

        /* 🖼️ 単体画像オブジェクト */
        .image-box {
            position: absolute; width: 120px; height: 120px;
            border: 1px solid var(--border-color); border-radius: 14px;
            box-shadow: var(--shadow-md); cursor: move; z-index: 15;
            background-size: cover; background-position: center; background-color: var(--card-color);
            display: flex; flex-direction: column; justify-content: space-between; padding: 6px; pointer-events: auto;
        }
        .image-box.active-image { border-color: var(--primary-color) !important; border-width: 2px; }
        .image-box-header { display: flex; justify-content: flex-end; opacity: 0; transition: opacity 0.2s; }
        .image-box:hover .image-box-header { opacity: 1; }
        .image-box:hover .generic-resize-handle { opacity: 0.5; }

        /* 関係線入力ボックス */
        .smart-label-box { position: absolute; transform: translate(-50%, -50%); display: flex; align-items: center; background: transparent; gap: 4px; z-index: 30; pointer-events: auto; }
        .smart-label-box input {
            border: 1px solid var(--border-color); font-size: 0.7rem; width: 80px; text-align: center; outline: none;
            background: var(--panel-color); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); color: var(--text-color); border-radius: 99px; padding: 4px 6px; font-weight: 500; box-shadow: var(--shadow-sm); transition: all 0.2s;
        }
        .smart-label-box input:focus, .smart-label-box.active input { border-color: var(--primary-color); width: 100px; box-shadow: var(--shadow-md); }

        /* 付箋テキストボックス */
        .memo-box {
            position: absolute; width: 190px; height: 130px; background: #fff9e6; border-radius: 16px; padding: 14px; box-shadow: var(--shadow-md); cursor: move; z-index: 15; display: flex; flex-direction: column; pointer-events: auto; border: 1px solid rgba(0,0,0,0.03);
        }
        body.dark-mode .memo-box { background: #2c2514; }
        .memo-header { display: flex; justify-content: flex-end; gap: 4px; margin-bottom: 4px; opacity: 0; transition: opacity 0.2s; }
        .memo-box:hover .memo-header { opacity: 1; }
        .memo-textarea { width: 100%; flex: 1; border: none; background: transparent; resize: none; outline: none; font-size: 0.8rem; color: #424245; line-height: 1.5; font-weight: 500; }
        body.dark-mode .memo-textarea { color: #e2e2e9; }

        /* フォーム系（垂直縦並びレイアウト） */
        .sidebar-title { font-size: 0.95rem; font-weight: 600; border-bottom: 1px solid var(--border-color); padding-bottom: 14px; display: flex; justify-content: space-between; align-items: center; white-space: nowrap; }
        .close-sidebar-btn { background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--text-muted); width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .close-sidebar-btn:hover { background: var(--accent-bg); }
        
        .sidebar-form-container { display: flex; flex-direction: column; gap: 16px; width: 100%; height: auto; }
        .form-group { display: flex; flex-direction: column; gap: 6px; width: 100%; }
        .form-group label { font-size: 0.75rem; font-weight: 600; color: var(--text-muted); }
        .form-group input[type="text"], .form-group textarea, .form-group select, .form-group input[type="color"] { padding: 12px; border: 1px solid var(--border-color); background-color: var(--card-color); color: var(--text-color); border-radius: 10px; font-size: 0.85rem; outline: none; transition: border-color 0.2s; width: 100%; }
        .form-group input[type="text"]:focus, .form-group textarea:focus, .form-group select:focus { border-color: var(--primary-color); }
        .form-group textarea { resize: none; height: 120px; }
        .form-group input[type="color"] { height: 42px; padding: 4px; cursor: pointer; }

        /* モーダル隔離 */
        #home-modal, #hide-manager-modal { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: rgba(0, 0, 0, 0.15); z-index: 500; 
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center;
        }
        body.dark-mode #home-modal, body.dark-mode #hide-manager-modal { background: rgba(0, 0, 0, 0.4); }
        .modal-content { background: var(--panel-color); backdrop-filter: blur(20px); width: 460px; max-height: 70vh; border-radius: 24px; padding: 28px; box-shadow: var(--shadow-lg); display: flex; flex-direction: column; gap: 20px; border: 1px solid var(--border-color); }
        .modal-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 14px; }
        .modal-title { font-size: 1rem; font-weight: 600; }
        
        .manager-list { display: flex; flex-direction: column; gap: 8px; overflow-y: auto; max-height: 40vh; }
        .manager-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--card-color); border: 1px solid var(--border-color); border-radius: 10px; }
        .manager-item span { font-size: 0.8rem; font-weight: 500; }
        .manager-btn { background: none; border: none; cursor: pointer; font-size: 0.8rem; color: var(--primary-color); padding: 6px 12px; border-radius: 6px; font-weight: 600; background-color: var(--accent-bg); }
        .manager-btn:hover { background-color: var(--border-color); }

        .save-list { overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding: 2px; }
        .save-item { display: flex; justify-content: space-between; align-items: center; padding: 14px 18px; border: 1px solid var(--border-color); background-color: var(--card-color); border-radius: 12px; cursor: pointer; transition: all 0.2s; }
        .save-item:hover { border-color: var(--primary-color); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
        .save-item span { font-size: 0.85rem; font-weight: 600; }
        .save-del-btn { background: none; border: none; color: #ff453a; cursor: pointer; font-size: 0.75rem; padding: 6px 12px; border-radius: 6px; font-weight: 500; }
        .save-del-btn:hover { background: rgba(255, 69, 58, 0.08); }
    </style>
</head>
<body>

    <header>
        <div class="brand">
            <h1>🍏 考察・相関図キャンバス Pro</h1>
            <div class="board-badge" id="current-board-name">未保存のボード</div>
        </div>
        <div class="controls">
            <button class="btn" id="dark-mode-toggle-btn">🌓 画面色</button>
            <button class="btn" id="undo-btn">↩️ 戻る</button>

            <div class="nav-item">
                <button class="btn">📂 ボード操作 ▼</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" id="home-btn">🏠 保存リストを開く</button>
                    <button class="dropdown-item" id="save-board-btn">💾 現在のボードを保存</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" id="open-hide-manager-btn">📁 非表示の要素を一覧管理</button>
                    <div class="dropdown-divider"></div>
                    <button class="dropdown-item" id="export-btn">📤 ファイルへバックアップ</button>
                    <button class="dropdown-item" id="import-btn-trigger">📥 バックアップから復元</button>
                    <button class="dropdown-item" id="output-png-btn">📷 画像として保存 (PNG)</button>
                </div>
            </div>
            <input type="file" id="import-file-input" accept=".json" style="display: none;">

            <div class="nav-item">
                <button class="btn">🎨 テンプレート ▼</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" id="template-correlation-btn">📊 標準の「人物相関図」</button>
                    <button class="dropdown-item" id="template-family-btn">🌳 三世代の「家系図」</button>
                </div>
            </div>

            <div class="nav-item">
                <button class="btn btn-primary">➕ 要素を追加 ▼</button>
                <div class="dropdown-menu">
                    <button class="dropdown-item" id="add-btn">👤 人物カードを追加</button>
                    <button class="dropdown-item" id="add-camp-btn">🛡️ 陣営エリアを追加</button>
                    <button class="dropdown-item" id="add-panel-btn">📦 枠パネルを追加</button>
                    <button class="dropdown-item" id="add-memo-btn">📝 考察テキストを追加</button>
                    <button class="dropdown-item" id="add-image-btn">🖼️ 画像を追加</button>
                </div>
            </div>
            <input type="file" id="global-image-loader" accept="image/*" style="display: none;">
        </div>
    </header>

    <div class="main-container">
        <div id="canvas-container">
            <svg id="relation-svg"></svg>
            <div id="html-layer"></div>
        </div>

        <div id="sidebar">
            <div class="sidebar-title">
                <span id="sidebar-panel-title">プロファイル編集</span>
                <button class="close-sidebar-btn" id="close-sidebar">✕</button>
            </div>
            
            <div id="sidebar-char-inputs" class="sidebar-form-container" style="display: none;">
                <div class="form-group">
                    <label>名前</label>
                    <input type="text" id="detail-name">
                </div>
                <div class="form-group">
                    <label>特徴・メモ</label>
                    <textarea id="detail-memo" placeholder="プロフィールの詳細設定など..."></textarea>
                </div>
            </div>

            <div id="sidebar-line-inputs" class="sidebar-form-container" style="display: none;">
                <div class="form-group">
                    <label>関係の名称（ラベル）</label>
                    <input type="text" id="detail-line-label">
                </div>
                <div class="form-group">
                    <label>矢印の向き</label>
                    <select id="detail-line-dir">
                        <option value="none">➖ 矢印なし（標準）</option>
                        <option value="forward">➡️ 引いた向きへ (A ➔ B)</option>
                        <option value="backward">⬅️ 逆向きへ (A ⬅️ B)</option>
                        <option value="both">↔️ 双方向</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>線の種類</label>
                    <select id="detail-line-style">
                        <option value="solid">━━━━ 実線（通常）</option>
                        <option value="dashed">‐ ‐ ‐ ‐ 点線（怪しい繋がり・不確定）</option>
                    </select>
                </div>
            </div>

            <div id="sidebar-camp-inputs" class="sidebar-form-container" style="display: none;">
                <div class="form-group">
                    <label>陣営・グループ名</label>
                    <input type="text" id="detail-camp-title">
                </div>
                <div class="form-group">
                    <label>テーマカラー</label>
                    <input type="color" id="detail-camp-color">
                </div>
                <div class="form-group">
                    <label>陣営の説明・メモ</label>
                    <textarea id="detail-camp-memo" placeholder="勢力説明など..."></textarea>
                </div>
            </div>

            <div id="sidebar-panel-inputs" class="sidebar-form-container" style="display: none;">
                <div class="form-group">
                    <label>枠パネルのタイトル</label>
                    <input type="text" id="detail-panel-title-val">
                </div>
                <div class="form-group">
                    <label>枠線のスタイル</label>
                    <select id="detail-panel-style">
                        <option value="solid">━━━━ 実線</option>
                        <option value="dashed">‐ ‐ ‐ ‐ 点線</option>
                        <option value="double">＝＝＝＝ 二重線</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>背景の不透明度</label>
                    <select id="detail-panel-opacity">
                        <option value="0.02">極薄め</option>
                        <option value="0.06">薄め</option>
                        <option value="0.12">標準</option>
                        <option value="0.25">濃いめ</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <div id="home-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">🏠 保存されたボード一覧</div>
                <button class="close-sidebar-btn" id="close-home-modal-btn">✕</button>
            </div>
            <div class="save-list" id="save-list-container"></div>
        </div>
    </div>

    <div id="hide-manager-modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title">📁 非表示中の要素一覧</div>
                <button class="close-sidebar-btn" id="close-hide-modal-btn">✕</button>
            </div>
            <div class="manager-list" id="hide-list-container"></div>
            <div class="dropdown-divider"></div>

        massUnhideBtn.addEventListener('click', () => {

        function saveStateToHistory() {
            const cardsLayout = []; document.querySelectorAll('.character-card').forEach(c => { cardsLayout.push({ id: c.id, left: parseInt(c.style.left), top: parseInt(c.style.top) }); });
            const campsLayout = []; document.querySelectorAll('.camp-zone').forEach(z => { campsLayout.push({ id: z.id, title: campData[z.id].title, color: campData[z.id].color, memo: campData[z.id].memo || '', left: parseInt(z.style.left), top: parseInt(z.style.top), width: z.offsetWidth, height: z.offsetHeight }); });
            const panelsLayout = []; document.querySelectorAll('.panel-zone').forEach(p => { panelsLayout.push({ id: p.id, title: panelData[p.id].title, style: panelData[p.id].style, opacity: panelData[p.id].opacity, left: parseInt(p.style.left), top: parseInt(p.style.top), width: p.offsetWidth, height: p.offsetHeight }); });
            const memosLayout = []; document.querySelectorAll('.memo-box').forEach(m => { memosLayout.push({ id: m.id, text: m.querySelector('textarea').value, left: parseInt(m.style.left), top: parseInt(m.style.top) }); });
            const imagesLayout = []; document.querySelectorAll('.image-box').forEach(i => { imagesLayout.push({ id: i.id, src: imageData[i.id].src, left: parseInt(i.style.left), top: parseInt(i.style.top), width: i.offsetWidth, height: i.offsetHeight }); });
            
            const snapshot = {
                cardData: JSON.parse(JSON.stringify(cardData)), campData: JSON.parse(JSON.stringify(campData)), panelData: JSON.parse(JSON.stringify(panelData)), memoData: JSON.parse(JSON.stringify(memoData)), imageData: JSON.parse(JSON.stringify(imageData)),
                connections: JSON.parse(JSON.stringify(connections)), cardsLayout, campsLayout, panelsLayout, memosLayout, imagesLayout, cardCount, campCount, memoCount, panelCount, imageCount
            };
            undoStack.push(snapshot); if (undoStack.length > 30) undoStack.shift();
        }

        undoBtn.addEventListener('click', () => {
            if (undoStack.length === 0) return; const prev = undoStack.pop();
            htmlLayer.innerHTML = ''; svg.innerHTML = ''; closeSidebar();
            cardCount = prev.cardCount; campCount = prev.campCount; memoCount = prev.memoCount; panelCount = prev.panelCount; imageCount = prev.imageCount; connections = prev.connections;
            
            cardData = Object.assign({}, prev.cardData); campData = Object.assign({}, prev.campData); panelData = Object.assign({}, prev.panelData || {}); memoData = Object.assign({}, prev.memoData); imageData = Object.assign({}, prev.imageData || {});

            if (prev.memosLayout) prev.memosLayout.forEach(m => { createMemoBox(m.id.replace('memo-',''), m.text, m.left, m.top); });
            if (prev.imagesLayout) prev.imagesLayout.forEach(i => { createImageBox(i.id.replace('img-',''), i.src, i.left, i.top, i.width, i.height); });

        addBtn.addEventListener('click', () => { saveStateToHistory(); cardCount++; createCharacterCard(cardCount); });

        function createCampZone(id, title = null, color = null, left = 150, top = 150, width = 280, height = 240, memo = '') {

        function createPanelZone(id, title = null, style = 'solid', opacity = '0.02', left = 100, top = 300, width = 300, height = 200) {

        function createCharacterCard(id, initialCampId = null, name = null, memo = '', left = null, top = null) {
            const cardId = `card-${id}`; cardData[cardId] = { name: name || `人物 ${id}`, memo: memo, hidden: cardData[cardId]?.hidden || false };

        function createImageBox(id, src, left = 250, top = 250, width = 120, height = 120) {

        function setupGenericDrag(el, resizable = false, handle = null, type = '') {
            let dragStartX, dragStartY, initL, initT, initW, initH, members = [], isDragging = false;
            
            el.addEventListener('mousedown', (e) => {
                if (e.target.closest('.ctrl-header-actions') || e.target.closest('.memo-header') || e.target.closest('.image-box-header') || e.target === handle || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
                dragStartX = e.pageX; dragStartY = e.pageY; initL = parseInt(el.style.left); initT = parseInt(el.style.top);
                if (type === 'camp') { members = []; document.querySelectorAll('.character-card').forEach(c => { if (isCardInZone(c, el)) members.push({ el: c, iL: parseInt(c.style.left), iT: parseInt(c.style.top) }); }); }
                isDragging = false; window.addEventListener('mousemove', onDragMove); window.addEventListener('mouseup', onDragEnd);
            });

            function onDragMove(e) {
                const dx = e.pageX - dragStartX; 
                const dy = e.pageY - dragStartY; 
                
                if(Math.abs(dx) > 3 || Math.abs(dy) > 3) isDragging = true;
                if(isDragging) { 
                    el.style.left = `${initL + dx}px`; 
                    el.style.top = `${initT + dy}px`; 
                    members.forEach(m => { 
                        m.el.style.left = `${m.iL + dx}px`; 
                        m.el.style.top = `${m.iT + dy}px`; 
                    }); 
                    drawLines(); 
                }
            }
            function onDragEnd() { window.removeEventListener('mousemove', onDragMove); window.removeEventListener('mouseup', onDragEnd); if (isDragging) saveStateToHistory(); else { if (type === 'camp') openCampSidebar(el.id); else if (type === 'panel') openPanelSidebar(el.id); } }

            if (resizable && handle) {
                handle.addEventListener('mousedown', (e) => { e.stopPropagation(); dragStartX = e.pageX; dragStartY = e.pageY; initW = el.offsetWidth; initH = el.offsetHeight; window.addEventListener('mousemove', onResizeMove); window.addEventListener('mouseup', onResizeEnd); });
                function onResizeMove(e) { const dw = e.pageX - dragStartX; const dh = e.pageY - dragStartY; el.style.width = `${Math.max(100, initW + dw)}px`; el.style.height = `${Math.max(80, initH + dh)}px`; if (type === 'camp') document.querySelectorAll('.character-card').forEach(c => checkCardCamp(c)); drawLines(); }
                function onResizeEnd() { window.removeEventListener('mousemove', onResizeMove); window.removeEventListener('mouseup', onResizeEnd); saveStateToHistory(); }
            }
        }

        function setupCardDragAndLink(card) {
            let isDragging = false; let isLinking = false; let dragStartX = 0, dragStartY = 0, initL = 0, initT = 0, pLine = null;
            card.addEventListener('mousedown', (e) => {
                if (e.target.closest('.card-controls') || e.target.classList.contains('name-input')) return;
                dragStartX = e.pageX; dragStartY = e.pageY; initL = parseInt(card.style.left) || 0; initT = parseInt(card.style.top) || 0;
                if (e.shiftKey || e.offsetX < 10 || e.offsetX > 82 || e.offsetY < 10 || e.offsetY > 82) {
                    isLinking = true; const cX = initL + 46; const cY = initT + 46;
                    pLine = document.createElementNS('http://www.w3.org/2000/svg', 'line'); pLine.setAttribute('stroke', '#0071e3'); pLine.setAttribute('stroke-width', '2'); pLine.setAttribute('stroke-dasharray', '4'); pLine.setAttribute('x1', cX); pLine.setAttribute('y1', cY); pLine.setAttribute('x2', cX); pLine.setAttribute('y2', cY); svg.appendChild(pLine);
                } else { isDragging = false; }
                window.addEventListener('mousemove', onMove); window.addEventListener('mouseup', onEnd);

            cardCount++; createCharacterCard(cardCount, null, "叔母", "", 210, 280); const aunt1 = `card-${cardCount}`;
            cardCount++; createCharacterCard(cardCount, null, "父", "", 330, 280); const father = `card-${cardCount}`;
            
            cardCount++; createCharacterCard(cardCount, null, "母", "", 510, 280); const mother = `card-${cardCount}`;

            drawLines();
        });

        // 🚀 一本化された最高精度のスクロール（パン）機能 🚀
        let isPanning = false;
        let startX, startY;

        container.addEventListener('mousedown', (e) => {
            // 💡 ヘッダー（メニュー全体）を触っている時は、絶対にスライド移動させない
            if (e.target.closest('header') || e.target.closest('.nav-item') || e.target.closest('#sidebar')) return;

            // 各種要素をドラッグしようとしている時もスライドさせない
            if (e.target.closest('.character-card') || 
                e.target.closest('.camp-zone') || 
                e.target.closest('.panel-zone') || 
                e.target.closest('.memo-box') || 
                e.target.closest('.image-box') || 
                e.target.tagName === 'INPUT' || 
                e.target.tagName === 'TEXTAREA') return;
            
            isPanning = true;
            startX = e.pageX - container.scrollLeft;
            startY = e.pageY - container.scrollTop;
            container.style.cursor = 'grabbing';
        });

        window.addEventListener('mousemove', (e) => {
            if (!isPanning) return;
            container.scrollLeft = e.pageX - startX;
            container.scrollTop = e.pageY - startY;
        });

        window.addEventListener('mouseup', () => {
            isPanning = false;
            container.style.cursor = 'grab';
        });
    </script>
